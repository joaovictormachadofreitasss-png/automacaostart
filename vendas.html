<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendas — LetsMaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070d; --bg2:#0a0e1a;
    --glass:rgba(255,255,255,.04); --glass-bd:rgba(255,255,255,.09);
    --cyan:#22d3ee; --purple:#a78bfa; --orange:#fb923c; --green:#34d399; --pink:#f472b6;
    --tx:#eef2ff; --txm:#8b93a7; --txd:#4b5267;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif;color:var(--tx);min-height:100vh;
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(167,139,250,.10), transparent 55%),
      radial-gradient(700px 600px at 50% 120%, rgba(251,146,60,.07), transparent 60%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  .mono,.kpi-big,.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;}

  /* LOGIN */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99;
    background:radial-gradient(700px 500px at 50% 30%, rgba(34,211,238,.08), transparent), var(--bg);}
  .login-card{background:var(--glass);border:1px solid var(--glass-bd);border-radius:20px;padding:40px 36px;width:330px;
    text-align:center;backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .login-card .lk{width:46px;height:46px;border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
    font-size:22px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);}
  .login-card h2{font-family:'Space Grotesk';font-size:21px;margin-bottom:6px;}
  .login-card p{color:var(--txm);font-size:13px;margin-bottom:22px;}
  .login-card input{width:100%;padding:13px 16px;border-radius:11px;border:1px solid var(--glass-bd);
    background:rgba(255,255,255,.05);color:#fff;font-size:15px;margin-bottom:14px;outline:none;}
  .login-card input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.15);}
  .login-card button{width:100%;padding:13px;border:none;border-radius:11px;cursor:pointer;font-weight:700;font-size:15px;
    color:#04121a;background:linear-gradient(135deg,var(--cyan),#38bdf8);}
  .login-err{color:#f87171;font-size:13px;margin-top:10px;display:none;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:22px 32px;
    border-bottom:1px solid var(--glass-bd);position:sticky;top:0;z-index:10;
    background:rgba(5,7,13,.7);backdrop-filter:blur(14px);}
  .brand{font-family:'Space Grotesk';font-weight:700;font-size:19px;letter-spacing:.5px;display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px var(--cyan);}
  .brand span{color:var(--cyan);}
  .hd-right{display:flex;align-items:center;gap:16px;}
  .freshness{font-size:11px;color:var(--txm);text-align:right;line-height:1.5;}
  .btn-refresh{padding:9px 18px;border-radius:50px;border:1px solid var(--cyan);color:var(--cyan);
    background:rgba(34,211,238,.06);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
  .btn-refresh:hover{background:rgba(34,211,238,.16);}

  main{padding:28px 32px;max-width:1240px;margin:0 auto;}

  /* FILTRO */
  .filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
  .chip{padding:8px 15px;border-radius:50px;border:1px solid var(--glass-bd);background:var(--glass);
    color:var(--txm);font-size:13px;cursor:pointer;transition:.2s;}
  .chip:hover{color:#fff;border-color:var(--txm);}
  .chip.on{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.1);box-shadow:0 0 16px rgba(34,211,238,.15);}
  .filter input[type=date]{background:var(--glass);border:1px solid var(--glass-bd);color:#fff;
    padding:8px 12px;border-radius:10px;font-size:13px;outline:none;}
  .filter input[type=date]:focus{border-color:var(--cyan);}
  .filter .sep{color:var(--txd);font-size:13px;}
  .filter .status{margin-left:auto;font-size:12px;color:var(--cyan);}

  /* HERO KPI */
  .hero{position:relative;border-radius:24px;padding:34px 36px;margin-bottom:28px;overflow:hidden;
    background:linear-gradient(135deg, rgba(34,211,238,.10), rgba(167,139,250,.06));
    border:1px solid var(--glass-bd);backdrop-filter:blur(16px);}
  .hero::after{content:'';position:absolute;top:-60%;right:-10%;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle, rgba(34,211,238,.18), transparent 65%);pointer-events:none;}
  .hero-lbl{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;font-weight:600;}
  .hero-val{font-family:'Space Grotesk';font-size:clamp(40px,7vw,68px);font-weight:700;line-height:1;}
  .hero-sub{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap;}
  .hero-sub div{font-size:13px;color:var(--txm);}
  .hero-sub b{display:block;font-family:'Space Grotesk';font-size:22px;color:#fff;font-weight:600;margin-top:2px;}

  /* SECTION TITLE */
  .sec-title{font-family:'Space Grotesk';font-size:15px;font-weight:600;color:var(--txm);
    letter-spacing:.5px;margin:30px 0 16px;text-transform:uppercase;}

  /* CARDS DE PRODUTO */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
  .pcard{position:relative;border-radius:18px;padding:24px;overflow:hidden;
    background:var(--glass);border:1px solid var(--glass-bd);backdrop-filter:blur(12px);transition:.25s;}
  .pcard:hover{transform:translateY(-3px);border-color:var(--accent,var(--cyan));}
  .pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--cyan));box-shadow:0 0 16px var(--accent,var(--cyan));}
  .pcard-top{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .pcard-emoji{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:20px;background:rgba(255,255,255,.05);border:1px solid var(--glass-bd);}
  .pcard-name{font-family:'Space Grotesk';font-weight:600;font-size:15px;line-height:1.2;}
  .pcard-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent,var(--cyan));margin-top:3px;}
  .pcard-fat{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin-bottom:4px;}
  .pcard-subfat{font-size:11.5px;color:var(--txm);margin:-2px 0 8px;}
  .pcard-row{display:flex;justify-content:space-between;font-size:13px;color:var(--txm);padding:7px 0;border-top:1px solid rgba(255,255,255,.05);}
  .pcard-row b{color:#fff;font-weight:600;}

  /* BUMP BREAKDOWN */
  .bump-box{margin-top:14px;padding-top:14px;border-top:1px dashed rgba(255,255,255,.12);}
  .bump-rate{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
  .bump-rate .big{font-family:'Space Grotesk';font-size:26px;font-weight:700;color:var(--green);}
  .bump-rate .lbl{font-size:12px;color:var(--txm);}
  .bump-bar{height:7px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:12px;}
  .bump-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:6px;}
  .bump-item{display:flex;justify-content:space-between;font-size:12px;color:var(--txm);padding:4px 0;}
  .bump-item b{color:#fff;}

  .loading{text-align:center;padding:70px;color:var(--txm);}
  .spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--cyan);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty{padding:50px;text-align:center;color:var(--txm);border:1px dashed var(--glass-bd);border-radius:16px;}

  @media(max-width:640px){ header{padding:16px;} main{padding:18px 16px;} .hero{padding:26px 22px;} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="lk">🔒</div>
    <h2>LetsMaker · Vendas</h2>
    <p>Acesso restrito à equipe</p>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')entrar()">
    <button onclick="entrar()">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="brand"><span class="dot"></span><span>LetsMaker</span> · Vendas</div>
    <div class="hd-right">
      <div class="freshness" id="freshness">—</div>
      <button class="btn-refresh" onclick="carregar()">↻ Atualizar</button>
    </div>
  </header>

  <main>
    <div class="filter">
      <button class="chip" data-p="hoje" onclick="atalho('hoje',this)">Hoje</button>
      <button class="chip" data-p="ontem" onclick="atalho('ontem',this)">Ontem</button>
      <button class="chip" data-p="7d" onclick="atalho('7d',this)">7 dias</button>
      <button class="chip on" data-p="30d" onclick="atalho('30d',this)">30 dias</button>
      <button class="chip" data-p="tudo" onclick="atalho('tudo',this)">Tudo</button>
      <span class="sep">|</span>
      <input type="date" id="f-ini"> <span class="sep">até</span> <input type="date" id="f-fim">
      <button class="chip" onclick="aplicarManual()">Filtrar</button>
      <span class="status" id="status"></span>
    </div>

    <div id="loading" class="loading"><div class="spinner"></div>Carregando vendas…</div>

    <div id="content" style="display:none">
      <!-- HERO -->
      <div class="hero">
        <div class="hero-lbl">Faturamento total no período</div>
        <div class="hero-val" id="hero-fat">R$ 0</div>
        <div class="hero-sub">
          <div>Vendas aprovadas<b id="hero-qtd">0</b></div>
          <div>Ticket médio<b id="hero-ticket">R$ 0</b></div>
          <div>Order bumps anexados<b id="hero-bumps">0</b></div>
        </div>
      </div>

      <div class="sec-title">Faturamento por produto</div>
      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<script>
  // ── CONFIG ──
  const SB_URL = 'https://drdodqhxecflgjrdxovs.supabase.co';
  const SB_KEY = 'sb_publishable_XEMLwGVpJSd5BmbmyHnmUg_uFdFsgFd'; // só leitura (RLS)

  // Mapa de produtos (id estável → nome limpo, categoria, cor/emoji)
  const PRODUTOS = {
    7267410: { nome:'Automação Start',      tag:'Low ticket',  cat:'low',  emoji:'🚀', cor:'var(--cyan)' },
    7839946: { nome:'7 Boas Práticas',      tag:'Order bump',  cat:'bump', emoji:'📘', cor:'var(--purple)' },
    7915838: { nome:'Universo de Soluções', tag:'Order bump',  cat:'bump', emoji:'🌐', cor:'var(--purple)' },
    4401736: { nome:'Renovações CIP',       tag:'Renovação',   cat:'cip',  emoji:'🔄', cor:'var(--green)' },
    2298674: { nome:'CIP Completo',         tag:'Alto ticket', cat:'cip',  emoji:'👑', cor:'var(--orange)' },
  };
  function infoProduto(id, nomeFallback){
    return PRODUTOS[id] || { nome:nomeFallback||('Produto '+id), tag:'Produto', cat:'outro', emoji:'📦', cor:'var(--pink)' };
  }

  const SENHA = 'letsmaker2026';   // senha compartilhada com a equipe (troque aqui se quiser)
  let allVendas = [];

  // ── LOGIN ──
  function entrar(){
    if(document.getElementById('pwd').value === SENHA){
      localStorage.setItem('lm_vendas_auth','1');
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='block';
      carregar();
    } else { document.getElementById('login-err').style.display='block'; }
  }
  if(localStorage.getItem('lm_vendas_auth')==='1'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    window.addEventListener('DOMContentLoaded', carregar);
  }

  // ── CARREGAR (paginado, mais recentes primeiro) ──
  async function carregar(){
    document.getElementById('loading').style.display='block';
    document.getElementById('content').style.display='none';
    try{
      let all=[], offset=0; const PAGE=1000;
      while(true){
        const res = await fetch(SB_URL+'/rest/v1/vendas?select=*&order=order_date.desc&limit='+PAGE+'&offset='+offset,
          { headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY } });
        const chunk = await res.json();
        if(!Array.isArray(chunk)){
          document.getElementById('loading').innerHTML='<p style="color:#f87171">Erro: '+JSON.stringify(chunk).slice(0,200)+'</p>';
          return;
        }
        all = all.concat(chunk);
        if(chunk.length < PAGE) break;
        offset += PAGE;
        if(offset > 100000) break;
      }
      allVendas = all;
      // freshness
      const ult = allVendas.length ? new Date(allVendas[0].order_date) : null;
      let fr = 'Atualizado: '+new Date().toLocaleTimeString('pt-BR')+' · '+allVendas.length+' vendas';
      if(ult) fr += '<br>última venda: '+ult.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      document.getElementById('freshness').innerHTML = fr;
      atalho('30d', document.querySelector('.chip[data-p="30d"]'));
    }catch(e){
      document.getElementById('loading').innerHTML='<p style="color:#f87171">Erro ao carregar: '+e.message+'</p>';
      return;
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  }

  // ── FILTRO POR DATA (usa YYYY-MM-DD do order_date, UTC) ──
  function dataStr(iso){ const m=String(iso||'').match(/^(\d{4}-\d{2}-\d{2})/); return m?m[1]:null; }
  function hojeUTC(){ const n=new Date(); const p=x=>String(x).padStart(2,'0');
    return n.getUTCFullYear()+'-'+p(n.getUTCMonth()+1)+'-'+p(n.getUTCDate()); }
  function somaDias(str,d){ const dt=new Date(str+'T00:00:00Z'); dt.setUTCDate(dt.getUTCDate()+d);
    const p=x=>String(x).padStart(2,'0'); return dt.getUTCFullYear()+'-'+p(dt.getUTCMonth()+1)+'-'+p(dt.getUTCDate()); }

  function atalho(tipo, btn){
    document.querySelectorAll('.chip[data-p]').forEach(c=>c.classList.remove('on'));
    if(btn) btn.classList.add('on');
    const hoje=hojeUTC(); let ini='', fim='';
    if(tipo==='hoje'){ ini=hoje; fim=hoje; }
    else if(tipo==='ontem'){ ini=somaDias(hoje,-1); fim=somaDias(hoje,-1); }
    else if(tipo==='7d'){ ini=somaDias(hoje,-6); fim=hoje; }
    else if(tipo==='30d'){ ini=somaDias(hoje,-29); fim=hoje; }
    else { ini=''; fim=''; }
    document.getElementById('f-ini').value=ini;
    document.getElementById('f-fim').value=fim;
    render(ini,fim);
  }
  function aplicarManual(){
    document.querySelectorAll('.chip[data-p]').forEach(c=>c.classList.remove('on'));
    render(document.getElementById('f-ini').value, document.getElementById('f-fim').value);
  }

  // ── RENDER ──
  function render(ini, fim){
    // filtra período
    let v = allVendas.filter(x=>{
      const d=dataStr(x.order_date); if(!d) return false;
      if(ini && d<ini) return false;
      if(fim && d>fim) return false;
      return true;
    });
    // só aprovadas/completas contam como faturamento
    const pagas = v.filter(x=> x.status==='APPROVED' || x.status==='COMPLETE');

    document.getElementById('status').textContent = pagas.length+' venda'+(pagas.length!==1?'s':'')+' no período';

    const fatTotal = pagas.reduce((a,b)=>a+(+b.value||0),0);
    const qtd = pagas.length;
    const ticket = qtd ? fatTotal/qtd : 0;
    const bumps = pagas.filter(x=>x.is_order_bump).length;

    document.getElementById('hero-fat').textContent    = brl(fatTotal);
    document.getElementById('hero-qtd').textContent    = qtd;
    document.getElementById('hero-ticket').textContent = brl(ticket);
    document.getElementById('hero-bumps').textContent  = bumps;

    // agrupa por produto
    const porProd = {};
    pagas.forEach(x=>{
      const id=x.product_id;
      if(!porProd[id]) porProd[id]={ qtd:0, fat:0, nome:x.product_name, id:id };
      porProd[id].qtd++; porProd[id].fat += (+x.value||0);
    });

    // mapa de order bumps por transação-base (pra taxa de anexação do low ticket)
    const bumpsPorBase={};
    pagas.filter(x=>x.is_order_bump).forEach(x=>{
      (bumpsPorBase[x.base_transaction]=bumpsPorBase[x.base_transaction]||[]).push(x);
    });

    // ordena: low ticket → cip → bumps → outros, por faturamento
    const ordem={low:0,cip:1,bump:2,outro:3};
    const cards = Object.values(porProd).sort((a,b)=>{
      const ia=infoProduto(a.id), ib=infoProduto(b.id);
      if(ordem[ia.cat]!==ordem[ib.cat]) return ordem[ia.cat]-ordem[ib.cat];
      return b.fat-a.fat;
    });

    document.getElementById('grid').innerHTML = cards.map(c=>{
      const info=infoProduto(c.id, c.nome);
      const ticketP = c.qtd ? c.fat/c.qtd : 0;
      let bumpHtml='';
      let fatExibido = c.fat;   // valor grande do card (por padrão = só o produto)
      let subFatHtml = '';      // subtexto opcional abaixo do valor grande
      // bloco do low ticket mostra taxa de anexação de order bumps
      if(info.cat==='low'){
        const lowVendas = pagas.filter(x=>x.product_id==c.id);
        const comBump = lowVendas.filter(x=> bumpsPorBase[x.base_transaction]);
        const taxa = lowVendas.length ? comBump.length/lowVendas.length*100 : 0;
        // soma de TODOS os order bumps anexados às vendas do low ticket
        let fatBumps = 0;
        lowVendas.forEach(x=> (bumpsPorBase[x.base_transaction]||[]).forEach(b=> fatBumps += (+b.value||0)));
        // valor grande = low ticket + order bumps (pacote completo); subtexto = só o low ticket
        fatExibido = c.fat + fatBumps;
        subFatHtml = `<div class="pcard-subfat">apenas low ticket: ${brl(c.fat)} &nbsp;·&nbsp; order bumps: ${brl(fatBumps)}</div>`;
        // detalhamento por bump
        const det={};
        comBump.forEach(x=> (bumpsPorBase[x.base_transaction]||[]).forEach(b=>{
          const n=infoProduto(b.product_id,b.product_name).nome;
          det[n]=(det[n]||0)+1;
        }));
        const detHtml = Object.entries(det).sort((a,b)=>b[1]-a[1])
          .map(([n,q])=>`<div class="bump-item">${n}<b>${q}x</b></div>`).join('')
          || '<div class="bump-item" style="color:var(--txd)">Nenhum order bump no período</div>';
        bumpHtml = `
          <div class="bump-box">
            <div class="bump-rate"><span class="big">${taxa.toFixed(0)}%</span><span class="lbl">levaram um order bump (${comBump.length} de ${lowVendas.length})</span></div>
            <div class="bump-bar"><span style="width:${taxa}%"></span></div>
            ${detHtml}
          </div>`;
      }
      return `
        <div class="pcard" style="--accent:${info.cor}">
          <div class="pcard-top">
            <div class="pcard-emoji">${info.emoji}</div>
            <div><div class="pcard-name">${info.nome}</div><div class="pcard-tag">${info.tag}</div></div>
          </div>
          <div class="pcard-fat">${brl(fatExibido)}</div>
          ${subFatHtml}
          <div class="pcard-row"><span>Vendas</span><b>${c.qtd}</b></div>
          <div class="pcard-row"><span>Ticket médio</span><b>${brl(ticketP)}</b></div>
          ${bumpHtml}
        </div>`;
    }).join('') || '<div class="empty">Nenhuma venda nesse período.</div>';
  }

  function brl(v){
    return 'R$ '+ (+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  // auto-refresh a cada 5 min (só se logado)
  setInterval(()=>{ if(localStorage.getItem('lm_vendas_auth')==='1') carregar(); }, 300000);
</script>
</body>
</html>
